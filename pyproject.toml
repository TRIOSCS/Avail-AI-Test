[tool.bandit]
exclude_dirs = ["tests", "alembic"]
skips = ["B101"]  # allow assert in non-test code (used in type narrowing)

# ---------------------------------------------------------------------------
# mypy — SINGLE source of truth (mypy.ini was deleted; P0.5 in
# docs/CODE_AUDIT_AND_HARDENING_PLAN.md). CI/pre-commit run:
#   mypy --ignore-missing-imports --no-strict-optional --config-file=pyproject.toml app/
#
# Every module is CHECKED (`ignore_errors` is banned — it silently disabled
# ~90% of the codebase and let unawaited-coroutine bugs ship). Legacy
# `Column[X]` declarative-model noise is suppressed per module group via
# targeted `disable_error_code` lists below; everything NOT listed —
# in particular unused-coroutine, unused-awaitable, name-defined, call-arg,
# no-redef, truthy-*, return — stays live everywhere.
# Burn-down of the disabled codes is tracked under P0.5.
# ---------------------------------------------------------------------------
[tool.mypy]
python_version = "3.13"
ignore_missing_imports = true
# no_strict_optional matches the old CI flag (mypy.ini era). Tracked debt: turning
# strict Optional checking on is part of the P0.5 burn-down. Flipping it to false
# measured 36 errors on 2026-07-15 (union-attr:15 assignment:11 operator:6
# return-value:2 unused-ignore:1 arg-type:1); worst modules: search_service:20,
# management.cleanup_known_bad:5, utils.graph_client:2,
# models.vendor_part_unavailability:2, then 1 each in normalization_helpers,
# seed_sample_data, rotate_encryption_salt, logging_config, worker_liveness_jobs,
# email_service, connectors.explorium.
no_strict_optional = true
# warn_return_any was ON in the deleted mypy.ini, briefly disabled as recorded
# debt (PR #714), and re-enabled 2026-07-15 after clearing all ~98 no-any-return
# errors. Keep it on — new code must not return Any from a typed signature.
warn_return_any = true
warn_unused_configs = true
warn_unused_ignores = true
warn_redundant_casts = true
check_untyped_defs = true
disallow_untyped_defs = false
# unused-coroutine is on by default; listed for explicitness (it is the error
# class that motivated P0.5). unused-awaitable is opt-in and catches dangling
# asyncio.create_task/gather results (P0.4).
enable_error_code = ["unused-coroutine", "unused-awaitable"]
exclude = ["alembic/", "tests/"]

# --- P0.5 burn-down overrides ----------------------------------------------
# Each block suppresses ONLY the error codes that are systemic legacy noise
# (untyped `Column(...)` declarative models make every attribute read/write a
# Column[X] vs value mismatch: assignment/arg-type/union-attr/index/...).
# Error counts at time of writing are noted per block.
#
# RULES for these overrides:
# - Do NOT add codes to these lists — fix new errors instead.
# - NEW modules must NOT be added to the disable lists (and must not silently
#   inherit a glob): a new module under app/services/ or app/routers/ is
#   expected to type-check clean; if it matches a glob below, add an explicit
#   re-enable override for it (see the "verified clean" blocks after the
#   globs — later sections win in mypy).
# - app.models.* and app.management.* are FULLY checked (no override), same as
#   the pre-pyproject CI path; keep them that way.
#
# Fully re-enabled (no override needed): app.models.*, app.schemas.*,
# app.connectors.*, app.cache.*, app.enrichment_service, app.scoring,
# app.utils.llm_router, app.utils.claude_client, and all of app.management.*
# except the two seed/reconcile scripts listed at the bottom.

[[tool.mypy.overrides]]
# ~1380 ORM-noise errors (arg-type:638 assignment:377 union-attr:232 ...).
# Live here: unused-coroutine, unused-awaitable, call-arg, no-redef, name-defined, ...
module = ["app.routers.*"]
disable_error_code = [
    "arg-type", "assignment", "union-attr", "attr-defined", "call-overload",
    "return-value", "var-annotated", "misc", "type-var", "index", "list-item",
]

[[tool.mypy.overrides]]
# ~1370 ORM-noise errors (assignment:540 arg-type:482 attr-defined:101 ...).
module = ["app.services.*"]
disable_error_code = [
    "assignment", "arg-type", "attr-defined", "var-annotated", "call-overload",
    "return-value", "union-attr", "index", "misc", "operator", "type-var",
    "typeddict-item", "str-format", "list-item",
]

[[tool.mypy.overrides]]
# ~100 ORM-noise errors (arg-type:57 attr-defined:23 assignment:15 ...).
module = ["app.search_service"]
disable_error_code = ["arg-type", "attr-defined", "assignment", "call-overload"]

[[tool.mypy.overrides]]
# ~50 ORM-noise errors (assignment:28 arg-type:22).
module = ["app.email_service"]
disable_error_code = ["assignment", "arg-type"]

[[tool.mypy.overrides]]
# ~24 ORM-noise errors (arg-type:13 assignment:11).
module = ["app.jobs.*"]
disable_error_code = ["assignment", "arg-type"]

[[tool.mypy.overrides]]
# ~10 ORM-noise errors (assignment:5 arg-type:2 ...).
module = ["app.startup"]
disable_error_code = ["assignment", "arg-type"]

[[tool.mypy.overrides]]
# ~7 ORM-noise errors (assignment:3 union-attr:3 arg-type:1).
module = ["app.utils.vendor_helpers"]
disable_error_code = ["assignment", "union-attr", "arg-type"]

# --- Verified-clean carve-outs from the globs above -------------------------
# These modules match the app.routers.* / app.services.* globs but were
# empirically verified to type-check with NO suppressions. Later override
# sections win in mypy, so listing them here with an empty disable list
# restores full checking. When a globbed module reaches zero errors, move it
# into this block.
[[tool.mypy.overrides]]
module = [
    "app.routers.avatars",
    "app.routers.error_reports",
    "app.services.category_normalizer",
    "app.services.buyplan_naming",
    "app.services.enrichment_credit_guard",
    "app.services.field_audit",
    "app.services.kanban_lanes",
    "app.services.qp_workspace",
    "app.services.spec_tiers",
    "app.services.stale_guard",
    "app.services.workspace_notes",
]
disable_error_code = []

# --- Remaining app.management ORM noise (per-module, NOT a package glob) ----
# app.management.* is otherwise FULLY checked; only these two scripts carry
# systemic legacy-Column noise too large to line-ignore. Do not re-glob.
[[tool.mypy.overrides]]
# ~42 ORM-noise errors (arg-type:33 assignment:9): seed helpers pass Column[X]
# attrs of freshly created legacy models into typed _mk_* factory params.
module = ["app.management.seed_sample_data"]
disable_error_code = ["arg-type", "assignment"]

[[tool.mypy.overrides]]
# ~27 ORM-noise errors (arg-type:17 index:2 call-overload:2 return-value:2
# assignment:1 ...): facet reconciliation reads legacy Column[str] attrs into
# typed decoder/spec-tier APIs.
module = ["app.management.reconcile_decoded_facets"]
disable_error_code = [
    "arg-type", "assignment", "index", "call-overload", "return-value",
]

[tool.docformatter]
wrap-summaries = 88
wrap-descriptions = 88
recursive = true
