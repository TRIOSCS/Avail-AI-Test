name: CI — Tests

on:
  push:
    branches: [main]
  # Run CI for PRs targeting any branch — supports stacked PRs where a feature
  # PR is based on another open feature branch rather than directly on main.
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    # Suite has grown to ~13.8k tests; locally it runs in ~2.5 min, but the
    # 2-vCPU GitHub runner takes longer. 15-min was being exceeded before the
    # suite could finish (~32% complete at the 15-min mark). 25 leaves room for
    # the suite to grow without immediate re-tuning.
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: availai
          POSTGRES_PASSWORD: availai
          POSTGRES_DB: availai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U availai -d availai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # full history so merge-base / changed-files diff works

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 \
            libffi-dev shared-mime-info

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Verify requirements lockfiles are in sync
        # requirements*.txt are COMPILED from requirements*.in via pip-tools (pinned
        # in requirements-dev.txt). Recompile WITHOUT --upgrade — existing pins are
        # kept, so a fresh PyPI release never counts as drift — and fail if the
        # committed lock changed, i.e. a .in was edited without recompiling, or a
        # .txt was hand-edited. Keeps installs reproducible.
        run: |
          pip-compile --no-header --no-strip-extras --quiet requirements.in
          pip-compile --no-header --no-strip-extras --quiet requirements-dev.in
          if ! git diff --exit-code requirements.txt requirements-dev.txt; then
            echo "::error::Lockfiles out of sync with their .in sources. Run: pip-compile --no-header --no-strip-extras requirements.in && pip-compile --no-header --no-strip-extras requirements-dev.in (then commit)."
            exit 1
          fi
          echo "Lockfiles in sync with .in sources."

      - name: Install frontend dependencies
        run: npm ci

      - name: Run pre-commit checks (files changed vs base)
        # Scope to files this branch changed, not --all-files, so pre-existing
        # drift in untouched files never blocks a PR. $GITHUB_BASE_REF is a
        # built-in env var (PR base branch; empty on push) — no template input.
        run: |
          if [ -n "$GITHUB_BASE_REF" ]; then
            git fetch -q origin "$GITHUB_BASE_REF"
            base=$(git merge-base "origin/$GITHUB_BASE_REF" HEAD)
          else
            base=$(git rev-parse HEAD^ 2>/dev/null || git rev-parse HEAD)
          fi
          echo "Running pre-commit on files changed in $base..HEAD"
          pre-commit run --from-ref "$base" --to-ref HEAD --show-diff-on-failure

      - name: Lint with ruff
        run: ruff check app/ tests/

      - name: No raw DDL outside Alembic
        run: |
          # Fail if app/ code executes raw DDL (schema-altering statements).
          # Only alembic/versions/ files may use DDL.
          # Excludes: comments, docstrings, VALIDATE CONSTRAINT (data-only).
          DDL_PATTERN='\b(ALTER TABLE|CREATE TABLE|DROP TABLE|CREATE INDEX|DROP INDEX|ADD COLUMN|DROP COLUMN|ADD CONSTRAINT|DROP CONSTRAINT|CREATE UNIQUE INDEX)\b'
          # scripts/reconstruct_001_baseline.py is migration-tooling that parses
          # pg_dump output via regex literals matching DDL keywords — exclude
          # it from the guard since it doesn't execute DDL itself.
          HITS=$(grep -rEin "$DDL_PATTERN" app/ scripts/ --include='*.py' \
            --exclude-dir=__pycache__ \
            --exclude='reconstruct_001_baseline.py' \
            | grep -v '^\s*#' \
            | grep -v 'VALIDATE CONSTRAINT' \
            | grep -v 'NEVER run destructive' \
            || true)
          if [ -n "$HITS" ]; then
            echo "::error::Raw DDL found outside alembic/versions/. Move to a migration."
            echo "$HITS"
            exit 1
          fi
          echo "No raw DDL found outside Alembic — OK"

      - name: Validate Alembic migrations
        env:
          TESTING: "1"
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -c "
          from alembic.config import Config
          from alembic.script import ScriptDirectory
          cfg = Config('alembic.ini')
          scripts = ScriptDirectory.from_config(cfg)
          head = scripts.get_current_head()
          revs = list(scripts.walk_revisions())
          print(f'Migration chain OK: {len(revs)} revision(s), head={head}')
          # Check for multiple heads (branching)
          heads = scripts.get_heads()
          assert len(heads) <= 1, f'Multiple migration heads detected: {heads}'
          "

      - name: Alembic upgrade + schema-drift gate (fresh DB)
        env:
          DATABASE_URL: postgresql://availai:availai@localhost:5432/availai
          SECRET_KEY: ci-secret-key
          SESSION_SECRET: ci-session-secret
          TESTING: "0"
          # check_schema_matches_models.py does `from app.models import Base`, so the repo
          # root must be importable (python runs the script with sys.path[0]=scripts/, not
          # the cwd). Without this the schema-drift gate dies on ModuleNotFoundError.
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # Apply the full migration chain forward onto a fresh DB, then assert the
          # resulting schema matches the ORM models (the schema-drift gate). We do NOT
          # replay `alembic downgrade base` here every PR: single-head-ness is already
          # asserted in "Validate Alembic migrations" above, and per-migration
          # reversibility is covered by the single-step downgrade smoke test below.
          # Unwinding the whole 001-baseline + 002+ chain to base needed an
          # ALEMBIC_ALLOW_CASCADE hack (the chain has no clean reverse drop ordering)
          # and was slow/fragile without adding coverage those two checks don't give.
          alembic upgrade head
          python scripts/check_schema_matches_models.py

      - name: Alembic single-step downgrade smoke test (no cascade)
        env:
          DATABASE_URL: postgresql://availai:availai@localhost:5432/availai
          SECRET_KEY: ci-secret-key
          SESSION_SECRET: ci-session-secret
          TESTING: "0"
          # Deliberately NOT setting ALEMBIC_ALLOW_CASCADE: a single-step
          # downgrade must use plain DROP (no CASCADE) so any FK-dependency
          # error in the head migration's downgrade surfaces here. The
          # cascade-to-base smoke test above masks those because it drops the
          # whole chain with CASCADE. Scope is -1 (one revision), not base.
        run: |
          alembic upgrade head
          alembic downgrade -1
          alembic upgrade head

      - name: Frontend build
        run: npm run build

      - name: Frontend tests
        run: npm run test:frontend

      - name: Run tests with coverage
        env:
          TESTING: "1"
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/ -v --tb=short \
            --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml \
            --cov-fail-under=50 \
            --junitxml=test-results.xml

      - name: Redis integration tests
        # Exercises the REAL redis-py client against the `redis` service above —
        # coverage the main suite cannot give (it runs under TESTING=1, where
        # every Redis path short-circuits to None/in-memory). Catches a
        # redis-py-breaking change (the redis-py 8.0 / #227 scenario) before it
        # ships. Uses INTEGRATION_REDIS_URL because conftest.py blanks REDIS_URL
        # for test isolation; -o addopts="" drops the suite-wide xdist/ignore opts.
        env:
          INTEGRATION_REDIS_URL: redis://localhost:6379/0
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/integration/test_redis_integration.py -v -o addopts=""

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml
