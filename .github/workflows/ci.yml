name: CI — Tests

on:
  push:
    branches: [main]
  # Run CI for PRs targeting any branch — supports stacked PRs where a feature
  # PR is based on another open feature branch rather than directly on main.
  pull_request:
  schedule:
    # Nightly full migration chain-replay (downgrade base → upgrade head). Too
    # slow/fragile to gate every PR with 160+ migrations, so it runs here on a
    # schedule instead — see the `migration-full-cycle` job below (HIGH-DEVOPS-7).
    - cron: "0 7 * * *"

# Cancel superseded runs of the same PR/branch; pushes to main and the nightly
# schedule get a unique group per run (run_id) so they are never cancelled.
concurrency:
  group: ci-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    # The nightly `schedule` trigger exists for migration-full-cycle below. The
    # full test job already ran for every push/PR (and the host runs the suite
    # nightly too) — don't burn ~12 runner-minutes re-running it every night.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    # P2.3 (docs/CODE_AUDIT_AND_HARDENING_PLAN.md): the 22.7k-test suite needed
    # ~24 min on a 2-vCPU runner and the timeout had been re-tuned three times
    # as the suite grew (15 → 25 → 40). Sharded into a 2-way matrix via
    # scripts/ci_shard.py (deterministic sorted-file round-robin — see that
    # script's header) so each shard carries ~half the pytest wall-clock;
    # 25 min = ~12 min of test-running headroom plus the one-time setup/gate
    # cost that shard 0 alone still pays (see the per-step `if:` gates below).
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: availai
          POSTGRES_PASSWORD: availai
          POSTGRES_DB: availai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U availai -d availai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # full history so merge-base / changed-files diff works

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 \
            libffi-dev shared-mime-info

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Verify requirements lockfiles are in sync
        # Environment-consistency check, not a per-test-shard concern — runs
        # once (shard 0) so a lockfile drift fails the run without being
        # checked twice. requirements*.txt are COMPILED from requirements*.in
        # via pip-tools (pinned in requirements-dev.txt). Recompile WITHOUT
        # --upgrade — existing pins are kept, so a fresh PyPI release never
        # counts as drift — and fail if the committed lock changed, i.e. a
        # .in was edited without recompiling, or a .txt was hand-edited.
        # Keeps installs reproducible.
        if: matrix.shard == 0
        run: |
          pip-compile --no-header --no-strip-extras --quiet requirements.in
          pip-compile --no-header --no-strip-extras --quiet requirements-dev.in
          if ! git diff --exit-code requirements.txt requirements-dev.txt; then
            echo "::error::Lockfiles out of sync with their .in sources. Run: pip-compile --no-header --no-strip-extras requirements.in && pip-compile --no-header --no-strip-extras requirements-dev.in (then commit)."
            exit 1
          fi
          echo "Lockfiles in sync with .in sources."

      - name: Install frontend dependencies
        if: matrix.shard == 0
        run: npm ci

      - name: Run pre-commit checks (files changed vs base)
        # Scope to files this branch changed, not --all-files, so pre-existing
        # drift in untouched files never blocks a PR. $GITHUB_BASE_REF is a
        # built-in env var (PR base branch; empty on push) — no template input.
        # P2.3: runs on shard 0 ONLY — pre-commit hooks are per-repo, not
        # per-test-file, so running them again on shard 1 would just be the
        # same hooks against the same diff a second time.
        if: matrix.shard == 0
        run: |
          if [ -n "$GITHUB_BASE_REF" ]; then
            git fetch -q origin "$GITHUB_BASE_REF"
            base=$(git merge-base "origin/$GITHUB_BASE_REF" HEAD)
          else
            base=$(git rev-parse HEAD^ 2>/dev/null || git rev-parse HEAD)
          fi
          echo "Running pre-commit on files changed in $base..HEAD"
          pre-commit run --from-ref "$base" --to-ref HEAD --show-diff-on-failure

      - name: Lint with ruff
        if: matrix.shard == 0
        run: ruff check app/ tests/

      - name: Assertion-theater lint (ratchet vs baseline)
        # P2.4: scripts/lint_assertion_theater.py flags a test whose ONLY
        # assertion is a bare `status_code == 200` / `is not None` check.
        # Ratchet model: scripts/assertion_theater_baseline.txt pins the
        # pre-existing offenders (P6.1 backfill burns it down); only NEW
        # violations fail. Whole-tree scan — changed-files scoping proved
        # useless the moment a mechanical sweep touched every test file.
        # To shrink the baseline after fixing tests:
        #   python scripts/lint_assertion_theater.py tests \
        #     --baseline scripts/assertion_theater_baseline.txt --write-baseline
        # Shard 0 only (same rationale as pre-commit).
        if: matrix.shard == 0
        run: |
          python scripts/lint_assertion_theater.py tests \
            --baseline scripts/assertion_theater_baseline.txt

      - name: No raw DDL outside Alembic
        if: matrix.shard == 0
        run: |
          # Fail if app/ code executes raw DDL (schema-altering statements).
          # Only alembic/versions/ files may use DDL.
          # Excludes: comments, docstrings, VALIDATE CONSTRAINT (data-only).
          DDL_PATTERN='\b(ALTER TABLE|CREATE TABLE|DROP TABLE|CREATE INDEX|DROP INDEX|ADD COLUMN|DROP COLUMN|ADD CONSTRAINT|DROP CONSTRAINT|CREATE UNIQUE INDEX)\b'
          # scripts/reconstruct_001_baseline.py is migration-tooling that parses
          # pg_dump output via regex literals matching DDL keywords — exclude
          # it from the guard since it doesn't execute DDL itself.
          HITS=$(grep -rEin "$DDL_PATTERN" app/ scripts/ --include='*.py' \
            --exclude-dir=__pycache__ \
            --exclude='reconstruct_001_baseline.py' \
            | grep -v '^\s*#' \
            | grep -v 'VALIDATE CONSTRAINT' \
            | grep -v 'NEVER run destructive' \
            || true)
          if [ -n "$HITS" ]; then
            echo "::error::Raw DDL found outside alembic/versions/. Move to a migration."
            echo "$HITS"
            exit 1
          fi
          echo "No raw DDL found outside Alembic — OK"

      - name: Validate Alembic migrations
        if: matrix.shard == 0
        env:
          TESTING: "1"
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -c "
          from alembic.config import Config
          from alembic.script import ScriptDirectory
          cfg = Config('alembic.ini')
          scripts = ScriptDirectory.from_config(cfg)
          head = scripts.get_current_head()
          revs = list(scripts.walk_revisions())
          print(f'Migration chain OK: {len(revs)} revision(s), head={head}')
          # Check for multiple heads (branching)
          heads = scripts.get_heads()
          assert len(heads) <= 1, f'Multiple migration heads detected: {heads}'
          "

      - name: Alembic upgrade + schema-drift gate (fresh DB)
        if: matrix.shard == 0
        env:
          DATABASE_URL: postgresql://availai:availai@localhost:5432/availai
          SECRET_KEY: ci-secret-key
          SESSION_SECRET: ci-session-secret
          TESTING: "0"
          # check_schema_matches_models.py does `from app.models import Base`, so the repo
          # root must be importable (python runs the script with sys.path[0]=scripts/, not
          # the cwd). Without this the schema-drift gate dies on ModuleNotFoundError.
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # Apply the full migration chain forward onto a fresh DB, then assert the
          # resulting schema matches the ORM models (the schema-drift gate). We do NOT
          # replay `alembic downgrade base` here every PR: single-head-ness is already
          # asserted in "Validate Alembic migrations" above, and per-migration
          # reversibility is covered by the single-step downgrade smoke test below.
          # Unwinding the whole 001-baseline + 002+ chain to base needed an
          # ALEMBIC_ALLOW_CASCADE hack (the chain has no clean reverse drop ordering)
          # and was slow/fragile without adding coverage those two checks don't give.
          alembic upgrade head
          python scripts/check_schema_matches_models.py

      - name: Alembic single-step downgrade smoke test (no cascade)
        if: matrix.shard == 0
        env:
          DATABASE_URL: postgresql://availai:availai@localhost:5432/availai
          SECRET_KEY: ci-secret-key
          SESSION_SECRET: ci-session-secret
          TESTING: "0"
          # Deliberately NOT setting ALEMBIC_ALLOW_CASCADE: a single-step
          # downgrade must use plain DROP (no CASCADE) so any FK-dependency
          # error in the head migration's downgrade surfaces here. The
          # cascade-to-base smoke test above masks those because it drops the
          # whole chain with CASCADE. Scope is -1 (one revision), not base.
        run: |
          alembic upgrade head
          alembic downgrade -1
          alembic upgrade head

      - name: Frontend build
        if: matrix.shard == 0
        run: npm run build

      - name: Frontend tests
        if: matrix.shard == 0
        run: npm run test:frontend

      - name: Run tests with coverage (shard ${{ matrix.shard }})
        env:
          TESTING: "1"
          PYTHONPATH: ${{ github.workspace }}
          # Unique coverage DATA file per shard (not a report) so parallel
          # matrix jobs never clobber each other; the coverage-report job
          # below combines both into one gated report. -n auto (xdist) still
          # applies within THIS shard's file subset via pytest.ini's addopts.
          COVERAGE_FILE: .coverage.${{ matrix.shard }}
        # -q not -v: ~21k tests at -v stream megabytes of log the 2-vCPU runner
        # has to flush; failures still show full detail via --tb=short.
        # --cov-report= (no report here): a partial shard's line coverage is
        # meaningless in isolation (a file fully covered by the OTHER shard's
        # tests looks "uncovered" here) — --cov-fail-under is enforced once,
        # post-merge, in the coverage-report job.
        run: |
          FILES=$(python scripts/ci_shard.py ${{ matrix.shard }} 2)
          echo "Shard ${{ matrix.shard }} running $(echo "$FILES" | wc -w) file(s)."
          pytest $FILES -q --tb=short \
            --cov=app --cov-report= \
            --junitxml=test-results-${{ matrix.shard }}.xml

      - name: Redis integration tests
        # Exercises the REAL redis-py client against the `redis` service above —
        # coverage the main suite cannot give (it runs under TESTING=1, where
        # every Redis path short-circuits to None/in-memory). Catches a
        # redis-py-breaking change (the redis-py 8.0 / #227 scenario) before it
        # ships. Uses INTEGRATION_REDIS_URL because conftest.py blanks REDIS_URL
        # for test isolation; -o addopts="" drops the suite-wide xdist/ignore opts.
        # Shard 0 only — this is a fixed, single-file integration check, not
        # part of the sharded unit-test split.
        if: matrix.shard == 0
        env:
          INTEGRATION_REDIS_URL: redis://localhost:6379/0
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/integration/test_redis_integration.py -v -o addopts=""

      - name: Upload test results (shard ${{ matrix.shard }})
        if: always()
        uses: actions/upload-artifact@v7
        with:
          # Shard-scoped artifact name — P2.3 requires this so the two
          # matrix jobs' results never clobber each other.
          name: test-results-${{ matrix.shard }}
          # Debugging artifacts go stale in days; the default 90-day retention
          # just accumulates storage.
          retention-days: 14
          path: |
            test-results-${{ matrix.shard }}.xml

      - name: Upload coverage data (shard ${{ matrix.shard }})
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-data-${{ matrix.shard }}
          retention-days: 14
          path: .coverage.${{ matrix.shard }}
          # Coverage data files are dotfiles; upload-artifact silently skips
          # hidden files by default, which orphans the coverage-report job.
          include-hidden-files: true

  coverage-report:
    # P2.3 follow-up: merges the per-shard coverage DATA files (uploaded as
    # shard-scoped artifacts above, so nothing clobbers) back into ONE report
    # so --cov-fail-under=85 still evaluates against the WHOLE suite, not
    # each half in isolation. Runs even if a shard failed its pytest step
    # (`always()`) so the coverage gate itself still reports accurately, but
    # is a no-op (skipped download -> combine fails loudly) if a shard never
    # produced its data file.
    needs: test
    # Skip (not fail) when the shards were cancelled — a superseding push
    # cancels in-progress shards via the concurrency group, and a combine
    # against artifacts that were never uploaded is pure noise, not signal.
    if: always() && needs.test.result != 'cancelled' && github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install coverage (pinned lock version)
        run: pip install "coverage[toml]==7.14.1"

      - name: Download shard 0 coverage data
        uses: actions/download-artifact@v8
        with:
          name: coverage-data-0

      - name: Download shard 1 coverage data
        uses: actions/download-artifact@v8
        with:
          name: coverage-data-1

      - name: Combine + enforce coverage gate
        run: |
          coverage combine .coverage.0 .coverage.1
          coverage xml -o coverage.xml
          coverage report --fail-under=85

      - name: Upload merged coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-merged
          retention-days: 14
          path: coverage.xml

  docker-build:
    # P2.2 (docs/CODE_AUDIT_AND_HARDENING_PLAN.md): `docker build` was never
    # exercised in CI before this job — the first-ever build of a release
    # image was the production deploy itself (deploy.yml calls `docker
    # compose build` against the release tag). This job builds BOTH
    # Dockerfiles as a required PR gate: the prod image (app /
    # enrichment-worker, same `Dockerfile` deploy.sh uses) and
    # Dockerfile.tooling (P1.4's split-out gh+Chromium image), so the latter
    # can't rot un-noticed since nothing in docker-compose.yml ever builds it.
    # BUILD_COMMIT mirrors deploy.sh's own cache-bust arg (short sha + unix
    # time) purely so this job exercises the exact same Dockerfile ARG path
    # production uses; nothing here is pushed or tagged anywhere.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute BUILD_COMMIT (mirrors deploy.sh)
        run: echo "BUILD_COMMIT=$(git rev-parse --short HEAD)-$(date +%s)" >> "$GITHUB_ENV"

      - name: Build production image (Dockerfile)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false
          build-args: |
            BUILD_COMMIT=${{ env.BUILD_COMMIT }}
          # GHA-hosted layer cache, scoped per-Dockerfile so the tooling
          # build below doesn't evict this one's cache or vice versa.
          cache-from: type=gha,scope=app-image
          cache-to: type=gha,mode=max,scope=app-image

      - name: Build tooling image (Dockerfile.tooling)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.tooling
          push: false
          cache-from: type=gha,scope=tooling-image
          cache-to: type=gha,mode=max,scope=tooling-image

  postgres-paths:
    # PG-only code paths — pg_trgm similarity(), the FTS `search_vector @@
    # plainto_tsquery` ranking, jsonb_each aggregation — CANNOT run on the
    # in-memory SQLite the main `test` job uses (they raise or silently fall back),
    # so a real regression there is invisible. This job runs the
    # `requires_postgres`-marked tests against a real Postgres 16 (PG_TEST_DSN set)
    # so those paths actually get asserted. The main job leaves PG_TEST_DSN unset,
    # so the same tests skip cleanly there.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: availai
          POSTGRES_PASSWORD: availai
          POSTGRES_DB: availai_pgtest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U availai -d availai_pgtest"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install system dependencies
        # app import pulls in WeasyPrint (PDF) — its shared libs must be present or
        # collection fails before a single PG test runs.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 \
            libffi-dev shared-mime-info

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run PostgreSQL-only path tests
        # PG_TEST_DSN activates the `requires_postgres` tests (skipped everywhere it
        # is unset). -n 0 disables xdist so the session-scoped `pg_engine` fixture
        # builds the schema once, with no concurrent create_all race between workers.
        env:
          TESTING: "1"
          PYTHONPATH: ${{ github.workspace }}
          PG_TEST_DSN: postgresql://availai:availai@localhost:5432/availai_pgtest
        run: |
          pytest tests/ -m requires_postgres -n 0 -v

  migration-full-cycle:
    # HIGH-DEVOPS-7: full chain-replay (downgrade base → re-upgrade head) of all
    # 160+ migrations. Too slow/fragile to gate every PR, so it runs nightly via
    # the `schedule` trigger instead. Per-PR CI keeps the cheap, high-value
    # checks: single-head assertion ("Validate Alembic migrations"), a fresh
    # `upgrade head` + schema-drift gate ("Alembic upgrade + schema-drift gate"),
    # and a single-step `downgrade -1` reversibility check on the new migration.
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: availai
          POSTGRES_PASSWORD: availai
          POSTGRES_DB: availai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U availai -d availai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 \
            libffi-dev shared-mime-info

      - name: Install Python dependencies
        # Prod lock only — alembic env.py imports the app models, which need the
        # runtime deps; the dev/test toolchain isn't required for a migration replay.
        run: pip install -r requirements.txt

      - name: Full migration chain-replay (downgrade base → upgrade head)
        env:
          DATABASE_URL: postgresql://availai:availai@localhost:5432/availai
          SECRET_KEY: ci-secret-key
          SESSION_SECRET: ci-session-secret
          TESTING: "0"
          PYTHONPATH: ${{ github.workspace }}
          # The 001 explicit-DDL baseline + incremental 002+ chain don't share a
          # clean reverse drop ordering, so unwinding to base needs cascade.
          # Production never sets this; single-step downgrades there still fail
          # loudly on FK-dependency errors.
          ALEMBIC_ALLOW_CASCADE: "1"
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head
