name: CI — Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: availai
          POSTGRES_PASSWORD: availai
          POSTGRES_DB: availai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U availai -d availai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 \
            libffi-dev shared-mime-info

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Install frontend dependencies
        run: npm ci

      - name: Run pre-commit checks
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Lint with ruff
        run: ruff check app/ tests/

      - name: No raw DDL outside Alembic
        run: |
          # Fail if app/ code executes raw DDL (schema-altering statements).
          # Only alembic/versions/ files may use DDL.
          # Excludes: comments, docstrings, VALIDATE CONSTRAINT (data-only).
          DDL_PATTERN='\b(ALTER TABLE|CREATE TABLE|DROP TABLE|CREATE INDEX|DROP INDEX|ADD COLUMN|DROP COLUMN|ADD CONSTRAINT|DROP CONSTRAINT|CREATE UNIQUE INDEX)\b'
          HITS=$(grep -rEin "$DDL_PATTERN" app/ scripts/ --include='*.py' \
            --exclude-dir=__pycache__ \
            | grep -v '^\s*#' \
            | grep -v 'VALIDATE CONSTRAINT' \
            | grep -v 'NEVER run destructive' \
            || true)
          if [ -n "$HITS" ]; then
            echo "::error::Raw DDL found outside alembic/versions/. Move to a migration."
            echo "$HITS"
            exit 1
          fi
          echo "No raw DDL found outside Alembic — OK"

      - name: Validate Alembic migrations
        env:
          TESTING: "1"
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -c "
          from alembic.config import Config
          from alembic.script import ScriptDirectory
          cfg = Config('alembic.ini')
          scripts = ScriptDirectory.from_config(cfg)
          head = scripts.get_current_head()
          revs = list(scripts.walk_revisions())
          print(f'Migration chain OK: {len(revs)} revision(s), head={head}')
          # Check for multiple heads (branching)
          heads = scripts.get_heads()
          assert len(heads) <= 1, f'Multiple migration heads detected: {heads}'
          "

      - name: Alembic upgrade/downgrade smoke test
        env:
          DATABASE_URL: postgresql://availai:availai@localhost:5432/availai
          SECRET_KEY: ci-secret-key
          SESSION_SECRET: ci-session-secret
          TESTING: "0"
        run: |
          alembic upgrade head
          alembic downgrade -1
          alembic upgrade head

      - name: Frontend build
        run: npm run build

      - name: Frontend tests
        run: npm run test:frontend

      - name: Run tests with coverage
        env:
          TESTING: "1"
          MVP_MODE: "false"
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/ -v --tb=short \
            --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml \
            --cov-fail-under=90 \
            --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml
