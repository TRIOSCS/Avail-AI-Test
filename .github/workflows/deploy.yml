name: Deploy to DigitalOcean

on:
  release:
    types: [published]

jobs:
  # Gate: never deploy a release commit whose CI is not green.
  verify-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Require green CI on the release commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          # Echo a check's status (if running) or conclusion (if completed),
          # or empty if it has not reported for this commit yet.
          check_state() {
            gh api "repos/$REPO/commits/$SHA/check-runs" --paginate \
              --jq ".check_runs[] | select(.name==\"$1\") | (if .status!=\"completed\" then .status else .conclusion end)" \
              2>/dev/null | head -1
          }
          # NOTE: check-runs are named after the JOB (test, security), not the
          # workflow ("CI — Tests" / "Security Scanning"). Match the job names.
          for attempt in $(seq 1 40); do
            T=$(check_state "test")
            S=$(check_state "security")
            echo "attempt $attempt — test=${T:-missing}  security=${S:-missing}"
            case "$T" in failure|cancelled|timed_out|action_required|stale)
              echo "ERROR: 'CI — Tests' for $SHA = $T — refusing to deploy." >&2; exit 1;; esac
            case "$S" in failure|cancelled|timed_out|action_required|stale)
              echo "ERROR: 'Security Scanning' for $SHA = $S — refusing to deploy." >&2; exit 1;; esac
            if [ "$T" = success ] && [ "$S" = success ]; then
              echo "All required checks green for $SHA — deploy may proceed."
              exit 0
            fi
            sleep 30
          done
          echo "ERROR: required CI checks did not all complete green within the wait window." >&2
          exit 1

  deploy:
    needs: verify-ci
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            # NOTE: deliberately NOT `set -e` — failures are handled explicitly so the
            # rollback block always runs. (A bare `set -e` aborted the old script at
            # `docker compose up -d` before rollback and left prod down — incident
            # 2026-06-20.) Deploys via git (the proven path), NOT a release zip:
            # `git archive`/unzip builds were unreliable and took prod down twice.
            set -uo pipefail
            cd /root/availai
            TS=$(date +%Y%m%d_%H%M%S)
            TAG="${{ github.event.release.tag_name }}"

            container_health() {
              docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' \
                "$(docker compose ps -q app)" 2>/dev/null || true
            }

            echo "=== Recording current commit + backing up DB ==="
            PREV=$(git rev-parse HEAD)
            echo "Current commit: $PREV"
            mkdir -p /root/backups
            echo "$PREV" > /root/backups/prev_commit_${TS}.txt
            docker compose exec -T db pg_dump --clean --if-exists -U availai availai \
              > /root/backups/avail_${TS}.sql \
              && echo "DB backup: /root/backups/avail_${TS}.sql ($(du -h /root/backups/avail_${TS}.sql | cut -f1))" \
              || echo "WARNING: DB backup failed — proceeding"

            echo "=== Checking out release $TAG (.env / .venv preserved — git-tracked files only) ==="
            git fetch origin --tags --prune
            git checkout -f main
            if ! git reset --hard "$TAG"; then
              echo "ERROR: cannot reset to tag $TAG — aborting, prod untouched"; exit 1
            fi
            NEW=$(git rev-parse --short HEAD)
            BC="${NEW}-$(date +%s)"
            echo "Deploying $NEW  (BUILD_COMMIT=$BC)"

            echo "=== Building (with BUILD_COMMIT cache-bust, like deploy.sh) ==="
            if ! docker compose build --build-arg BUILD_COMMIT="$BC" app enrichment-worker; then
              echo "ERROR: build failed — rolling back code to $PREV"
              git reset --hard "$PREV"
              exit 1
            fi
            docker compose up -d || echo "WARNING: up -d returned non-zero — health check decides"

            echo "=== Health check (container status, up to 90s) ==="
            HEALTHY=""
            for i in $(seq 1 18); do
              sleep 5
              HS=$(container_health)
              if [ "$HS" = healthy ]; then HEALTHY=1; echo "App healthy after $((i*5))s"; break; fi
              echo "  Attempt $i/18 — app is '$HS'..."
            done

            if [ -n "$HEALTHY" ]; then
              echo "=== Refresh host systemd workers (no-op if not on this host) ==="
              cp deploy/avail-nc-worker.service deploy/avail-ics-worker.service deploy/avail-tbf-worker.service deploy/avail-xvfb.service /etc/systemd/system/ 2>/dev/null || true
              systemctl daemon-reload 2>/dev/null || true
              systemctl restart avail-xvfb avail-nc-worker avail-ics-worker avail-tbf-worker 2>/dev/null || true
              find /root/backups -name "avail_*.sql" -mtime +7 -delete 2>/dev/null || true
              find /root/backups -maxdepth 1 -name "code_*" -mtime +7 -exec rm -rf {} + 2>/dev/null || true
              find /root/backups -name "prev_commit_*.txt" -mtime +7 -delete 2>/dev/null || true
              echo "=== Deploy $TAG complete ($BC) ==="
              exit 0
            fi

            echo "ERROR: app not healthy — rolling back code + DB to $PREV"

            # P1.3: take a safety dump of the DB as it stands right now — BEFORE
            # we overwrite it with the pre-deploy backup below — so whatever got
            # written during this deploy's failed window (migrations that did
            # run, any user writes against the new schema) isn't just discarded.
            # Mirrors scripts/restore.sh's pre-restore safety-dump pattern
            # (dump-before-destructive-op, best-effort, loud logging) using this
            # workflow's own `avail_*.sql` naming so it's swept by the existing
            # retention cleanup like any other dump here.
            RTS=$(date +%Y%m%d_%H%M%S)
            SAFETY_DUMP="/root/backups/avail_prerollback_${RTS}.sql"
            if docker compose exec -T db pg_dump --clean --if-exists -U availai availai \
                 > "$SAFETY_DUMP" 2>/dev/null && [ -s "$SAFETY_DUMP" ]; then
              echo "Pre-rollback safety dump: ${SAFETY_DUMP} ($(du -h "$SAFETY_DUMP" | cut -f1)) — this preserves the DB exactly as the failed deploy left it."
            else
              echo "WARNING: pre-rollback safety dump failed or is empty — the current DB state (any writes made during the failed deploy window) will NOT be recoverable once the restore below runs."
              rm -f "$SAFETY_DUMP" 2>/dev/null || true
              SAFETY_DUMP=""
            fi

            git reset --hard "$PREV"
            docker compose build --build-arg BUILD_COMMIT="rb-$(date +%s)" app enrichment-worker
            # Scoped to app + enrichment-worker + caddy (matches the build above,
            # plus caddy) — NOT a bare `docker compose up -d`. `git reset --hard`
            # just rewound docker-compose.yml AND the Caddyfile to $PREV; caddy's
            # config is part of deploys (Caddyfile mount, no build step of its own),
            # so it must revert alongside the code or a deploy that changed caddy
            # config but failed leaves caddy running the broken config. db/redis/
            # db-backup stay excluded (stateful services, config rarely deploy-
            # coupled) — exactly the blast-radius P1.3 flagged.
            docker compose up -d app enrichment-worker caddy
            # NOTE: whether the failed deploy actually ran/committed a forward
            # migration isn't observable from this script (that decision lives
            # inside docker-entrypoint.sh, several process boundaries away), so
            # this restore stays unconditional rather than guessing. The safety
            # dump above is what makes that an acceptable default: nothing is
            # unrecoverable, just downgraded to "restore it by hand if needed."
            if docker compose exec -T db psql -U availai -d availai < /root/backups/avail_${TS}.sql; then
              echo "Database restore completed (pre-deploy state from avail_${TS}.sql)"
              if [ -n "$SAFETY_DUMP" ]; then
                echo "NOTICE: any DB writes made between deploy start and this rollback were just discarded from the live database."
                echo "NOTICE: they are recoverable from the pre-rollback safety dump: ${SAFETY_DUMP}"
              fi
            else
              echo "CRITICAL: Database restore failed"
              if [ -n "$SAFETY_DUMP" ]; then
                echo "NOTICE: pre-rollback safety dump is still available at: ${SAFETY_DUMP}"
              fi
            fi
            sleep 10
            if [ "$(container_health)" = healthy ]; then
              echo "Rollback successful — previous version restored"
            else
              echo "CRITICAL: Rollback also failed — manual intervention required (scripts/recover_prod.sh)"
            fi
            exit 1
