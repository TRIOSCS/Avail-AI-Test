name: Security Scanning

on:
  push:
    branches: [main]
  # Run security scans for PRs targeting any branch (stacked-PR support).
  pull_request:
  schedule:
    - cron: "0 8 * * 1"  # Weekly Monday 8am UTC

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          # Upgrade pip itself first — pip 26.0.1 has CVE-2026-3219 / CVE-2026-6357.
          python -m pip install --upgrade "pip>=26.1"
          pip install -r requirements.txt
          pip install bandit pip-audit
          npm ci

      - name: Bandit security linter
        run: bandit -r app/ -c pyproject.toml -f json -o bandit-report.json || true

      - name: Bandit summary
        if: always()
        run: bandit -r app/ -c pyproject.toml -ll

      - name: pip-audit vulnerability scan
        # --requirement scopes the audit to declared deps (app + dev) and their
        # transitive resolution, excluding the CI runner's pre-installed packages
        # (e.g. the runner-bundled pip itself), whose CVEs are not actionable
        # for this app. Both files are audited so dev tooling (pytest, ruff,
        # mypy, bandit, playwright-python, etc.) is covered.
        run: pip-audit --desc --requirement requirements.txt --requirement requirements-dev.txt

      - name: npm audit vulnerability scan
        run: npm audit --audit-level=high

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-report
          path: bandit-report.json
