name: Security Scanning

on:
  push:
    branches: [main]
  # Run security scans for PRs targeting any branch (stacked-PR support).
  pull_request:
  schedule:
    - cron: "0 8 * * 1"  # Weekly Monday 8am UTC

# Cancel superseded PR runs (a new push to the same PR branch obsoletes the old scan),
# but keep every push/schedule run — the run_id fallback makes those groups unique so
# main-branch and weekly history is never cancelled. Mirrors ci.yml (CI-2).
concurrency:
  group: security-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          # Upgrade pip itself first — pip 26.0.1 has CVE-2026-3219 / CVE-2026-6357.
          python -m pip install --upgrade "pip>=26.1"
          pip install -r requirements.txt
          pip install bandit pip-audit
          npm ci

      - name: Bandit security linter
        # Single scan: the JSON artifact and the gating summary come from ONE
        # bandit run (it used to scan app/ twice back-to-back). -ll gates on
        # medium+ severity; the JSON report is uploaded below for triage.
        run: |
          bandit -r app/ -c pyproject.toml -f json -o bandit-report.json -ll || rc=$?
          bandit_exit=${rc:-0}
          python -c "
          import json
          d = json.load(open('bandit-report.json'))
          for r in d.get('results', []):
              print(f\"{r['issue_severity']}: {r['filename']}:{r['line_number']} {r['test_id']} {r['issue_text']}\")
          print(f\"{len(d.get('results', []))} finding(s)\")
          "
          exit $bandit_exit

      - name: pip-audit vulnerability scan
        # --requirement scopes the audit to declared deps (app + dev) and their
        # transitive resolution, excluding the CI runner's pre-installed packages
        # (e.g. the runner-bundled pip itself), whose CVEs are not actionable
        # for this app. Both files are audited so dev tooling (pytest, ruff,
        # mypy, bandit, playwright-python, etc.) is covered.
        run: pip-audit --desc --requirement requirements.txt --requirement requirements-dev.txt

      - name: npm audit vulnerability scan
        run: npm audit --audit-level=high

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-report
          path: bandit-report.json
