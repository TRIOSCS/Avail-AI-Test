# `pre-commit install` auto-installs both hook types: pre-commit (runs on
# staged files at commit time) + pre-push (runs the commit-stage hooks against
# only the files THIS branch changed vs origin/main — so unrelated branch-wide
# formatter drift in untouched files never blocks a push). See the local
# `changed-files-on-push` hook below.
#
# First-time setup per developer:
#   pre-commit install           # installs both hook types automatically
# Escape hatch if a push hook false-positives:
#   git push --no-verify
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/PyCQA/docformatter
    rev: v1.7.7
    hooks:
      - id: docformatter
        args: [--wrap-summaries=88, --wrap-descriptions=88, --in-place]

  # P2.9: the hook env must match the real gate (requirements-dev.txt mypy) —
  # rev tracks the mypy pin in requirements-dev.txt, and additional_dependencies
  # pins the key typed runtime deps (versions from requirements.txt) so the
  # isolated hook venv sees the same types as a full-dep run. Bump these pins
  # together with the requirements lockfiles.
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --no-strict-optional, --config-file=pyproject.toml, app/]
        additional_dependencies: [
          types-requests,
          "sqlalchemy==2.0.51",
          "pydantic==2.13.4",
          "pydantic-settings==2.14.2",
          "fastapi==0.138.1",
        ]
        pass_filenames: false
        verbose: true

  # P2.5: mechanically enforces the StrEnum-status rule (CLAUDE.md Non-Negotiables +
  # app/constants.py) — `.status = "raw string"` bypasses the enum and lets a raw
  # literal silently diverge from it. Use the matching StrEnum member instead (e.g.
  # `req.status = RequisitionStatus.OPEN`). app/constants.py itself is excluded (it
  # IS the enum source); app/services/requisition_state.py is excluded because its
  # only match is a module docstring line documenting the anti-pattern it replaces
  # (`` `req.status = "..."` ``), not a live assignment — verified via
  # `grep -rnP '\.status\s*=\s*"' app/` before adding this hook (2026-07-09).
  - repo: local
    hooks:
      - id: no-raw-status-assignment
        name: reject raw string `.status = "..."` (use a StrEnum from app/constants.py)
        entry: '\.status\s*=\s*"'
        language: pygrep
        files: ^app/.*\.py$
        exclude: ^app/constants\.py$|^app/services/requisition_state\.py$

  # Pre-push gate: runs the commit-stage hooks against ONLY the files this
  # branch changed since it forked from origin/main. This mirrors CI exactly
  # and — unlike the old --all-files sweep — never flags pre-existing drift in
  # files the branch never touched (which forced every PR to bundle unrelated
  # reformatting). --hook-stage pre-commit runs the commit-stage hooks (no
  # recursion). Bypass with `git push --no-verify` if it false-positives.
  - repo: local
    hooks:
      # DOWN-only ratchet: fails if new legacy SQLAlchemy 1.x `<session>.query(`
      # sites are introduced under app/ (see tests/test_query_api_ratchet.py and
      # scripts/query_api_baseline.py). Scans the whole tree, so pass_filenames
      # is off and it always runs. Removing sites + lowering the baseline json is
      # the sanctioned path.
      - id: query-api-ratchet
        name: legacy SQLAlchemy Query-API ratchet (down-only)
        entry: bash -c 'exec "$(command -v python3 || command -v python)" -m scripts.query_api_baseline --check'
        language: system
        pass_filenames: false
        always_run: true

      - id: changed-files-on-push
        name: pre-commit on files changed vs origin/main
        entry: bash -c 'base=$(git merge-base origin/main HEAD 2>/dev/null || echo origin/main); pre-commit run --from-ref "$base" --to-ref HEAD --hook-stage pre-commit'
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
