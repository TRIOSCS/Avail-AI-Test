target-version = "py313"
line-length = 120

[lint]
select = ["E", "F", "W", "I", "UP", "ASYNC", "B904", "BLE001", "T20", "RUF006", "RUF100"]
ignore = [
    "E501",  # line length handled separately
    # ASYNC109 is "highly opinionated" (ruff's words): it flags ANY async def with a
    # `timeout` parameter. Every hit here (claude_client, graph_client, llm_router,
    # enrichment_worker extractors) forwards that timeout to httpx/Graph — nobody
    # hand-rolls timeout logic — and restructuring public helper signatures around
    # asyncio.timeout() context managers is not a lint fix. The real event-loop
    # blockers are covered by the rest of the ASYNC family (230/240/etc.), which is on.
    "ASYNC109",
]

[lint.per-file-ignores]
# E402/F841: allow late imports and side-effect assignments in tests.
# ASYNC230: blocking fixture-file I/O inside an async test only stalls that test's
# own event loop — there are no concurrent requests to starve.
# BLE001: tests routinely catch Exception around exercised failure paths.
"tests/*" = ["E402", "F841", "ASYNC230", "BLE001"]
"app/models/*" = ["E402"]
"app/routers/*" = ["E402"]  # routers use deferred imports for circular dep avoidance
"app/scheduler.py" = ["E402"]
"app/services/routing_service.py" = ["E402"]
"alembic/*" = ["E402"]
# F841: side-effect assignments. ASYNC230: one-off CLI batch scripts own their whole
# event loop — a blocking open() stalls nothing but the script itself. T201: stdout
# IS the UX of a CLI script. BLE001: top-level catch-log-continue is deliberate there.
"scripts/*" = ["F841", "ASYNC230", "T201", "BLE001"]
# CLI management commands (python -m app.management.*): stdout is their UX.
"app/management/*" = ["T201"]
# Deliberate broad-catch orchestrators: scheduler jobs must never let one failing
# item kill the whole run.
"app/jobs/*" = ["BLE001"]

# ── BLE001 legacy freeze (P2.1, 2026-07-09) ─────────────────────────────────
# `except Exception` + log-and-continue is this codebase's pervasive resilience
# pattern (supplier fan-outs, cache fallbacks, notification fan-outs, HTMX
# fallback rendering) — 529 pre-existing catches measured when BLE001 was
# enabled. Rather than exempting whole directories (which would also exempt
# FUTURE files), every file that had hits at enable time is frozen here
# individually: new files anywhere get full BLE001 enforcement. Burn this list
# down opportunistically — when you narrow a file's catches, delete its line.
# (Three files also needed E402: a second key for the same file would be a TOML
# duplicate-key error, so their E402 entries were merged into this list.)
"app/main.py" = ["E402", "BLE001"]
"app/utils/graph_client.py" = ["E402", "BLE001"]
"app/services/credential_service.py" = ["E402", "BLE001"]
"app/cache/decorators.py" = ["BLE001"]
