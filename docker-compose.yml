# AvailAI — docker compose up -d
# Three containers: your app, the database, and HTTPS

services:
  # --- Database ---
  db:
    image: postgres:16-alpine
    restart: always
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
      -c shared_buffers=1GB
      -c effective_cache_size=4GB
      -c work_mem=16MB
      -c maintenance_work_mem=256MB
      -c random_page_cost=1.1
      -c checkpoint_completion_target=0.9
      -c log_min_duration_statement=500
      -c log_checkpoints=on
      -c log_lock_waits=on
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-availai}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.5'
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # --- Redis Cache ---
  redis:
    image: redis:7-alpine
    restart: always
    # P1.4: --requirepass wired from REDIS_PASSWORD (compose-file interpolation,
    # not a container env var — redis-server only needs the value on argv).
    # ${REDIS_PASSWORD:+...} expands to nothing when REDIS_PASSWORD is unset/empty,
    # so local dev with no REDIS_PASSWORD in .env keeps running with no auth
    # (unchanged default behavior). Production MUST set REDIS_PASSWORD in .env —
    # Redis is not exposed past the internal compose network either way, but
    # requirepass is defense-in-depth against a compromised container reaching it.
    command: >
      redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    volumes:
      - redisdata:/data
    healthcheck:
      # Same conditional: only pass -a when a password is actually configured,
      # otherwise `redis-cli -a ''` sends a spurious AUTH and errors against a
      # server with no requirepass set — exactly the "silently break local dev"
      # failure mode P1.4 calls out.
      test: ["CMD-SHELL", "redis-cli ${REDIS_PASSWORD:+-a ${REDIS_PASSWORD} --no-auth-warning} ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 768M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # --- Your App ---
  app:
    build: .
    restart: always
    # Trust X-Forwarded-* headers only from the compose network (where Caddy
    # is the sole HTTP client) — never "*", which would trust a spoofed
    # X-Forwarded-For from any client that reached uvicorn directly.
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers", "--forwarded-allow-ips", "172.28.0.0/24"]
    env_file: .env
    # P1.4: REDIS_URL is composed here (not left to whatever plain value is in
    # .env) so redis auth wiring can never drift from the redis service's own
    # --requirepass above. `environment:` here overrides any REDIS_URL from
    # env_file for the same key. Empty REDIS_PASSWORD -> plain
    # redis://redis:6379/0 (unchanged default local-dev behavior).
    environment:
      - REDIS_URL=redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}redis:6379/0
    stop_grace_period: 60s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - static_files:/srv/static
      - applogs:/var/log/avail
      - ./scripts:/app/scripts:ro
    healthcheck:
      # Liveness only (P2.7 docs/CODE_AUDIT_AND_HARDENING_PLAN.md): /health answers as
      # soon as the app can serve traffic. Startup's SLOW idempotent backfills/ANALYZE
      # now run in a post-yield background task (see app/startup.py
      # run_deferred_startup_backfills), so a prod-sized DB can no longer make this
      # healthcheck (or deploy.sh's wait loop, which polls this same status) time out
      # behind a full-table scan. Readiness for that background phase is reported
      # separately at GET /health/ready — deliberately NOT wired here, so a slow
      # deferred phase can never flip this container "unhealthy".
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
        reservations:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"

  # --- Enrichment Worker ---
  enrichment-worker:
    build: .
    restart: always
    command: ["python", "-m", "app.services.enrichment_worker"]
    env_file: .env
    # stop_grace_period 60s: worker.py's graceful-shutdown handler needs room to
    # finish an in-flight enrichment batch instead of being SIGKILLed at the
    # compose default 10s mid-batch (P1.4).
    stop_grace_period: 60s
    environment:
      - ENRICHMENT_BATCH_SIZE=${ENRICHMENT_BATCH_SIZE:-5}
      - ENRICHMENT_DAILY_CAP=${ENRICHMENT_DAILY_CAP:-200}
      - ENRICHMENT_WEB_DAILY_CAP=${ENRICHMENT_WEB_DAILY_CAP:-80}
      - ENRICHMENT_LOOP_SLEEP_SECONDS=${ENRICHMENT_LOOP_SLEEP_SECONDS:-30}
      - ENRICHMENT_IDLE_SLEEP_SECONDS=${ENRICHMENT_IDLE_SLEEP_SECONDS:-60}
      - ENRICHMENT_NOT_FOUND_RETRY_HOURS=${ENRICHMENT_NOT_FOUND_RETRY_HOURS:-22}
      - ENRICHMENT_CIRCUIT_BREAKER_ERRORS=${ENRICHMENT_CIRCUIT_BREAKER_ERRORS:-5}
      # P1.4: same REDIS_URL composition as `app` — keep in sync if changed.
      - REDIS_URL=redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # --- Database Backup (automated pg_dump every 6 hours) ---
  db-backup:
    image: postgres:16-alpine
    restart: always
    entrypoint: ["/bin/bash", "/scripts/backup-cron.sh"]
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      BACKUP_DIR: /backups
      BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-6}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - pgbackups:/backups
      - ./scripts:/scripts:ro
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # --- HTTPS (auto-generates SSL certificate for your domain) ---
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # :ro — the internet-facing container must not be able to rewrite its own
      # routing/security config if compromised.
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - static_files:/srv/static:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  pgdata:
  pgbackups:
  uploads:
  redisdata:
  caddy_data:
  caddy_config:
  static_files:
  applogs:

# Pin the default network to a fixed subnet so the app's --forwarded-allow-ips
# can name it. All services already share the implicit `default` network;
# this only fixes its address range. If 172.28.0.0/24 collides with an
# existing Docker network on the host, change it here and in the app
# `command:` (and docker-compose.local.yml) to a free range.
networks:
  default:
    ipam:
      config:
        - subnet: 172.28.0.0/24
