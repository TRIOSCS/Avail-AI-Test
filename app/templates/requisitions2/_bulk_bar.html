{#
  _bulk_bar.html — Bulk action bar shown when rows are selected.
  Uses Alpine.js for selection state, HTMX for bulk operations.
  Called by: page.html (include)
  Depends on: Alpine.js (selectedIds), HTMX, Tailwind
#}
<div id="rq2-bulk-bar"
     class="mb-4 flex items-center gap-3 rounded-lg border border-brand-200 bg-brand-50 px-4 py-3 shadow-sm"
     x-show="selectedIds.size > 0"
     x-collapse
     x-cloak>

  <span class="text-sm font-medium text-brand-700" x-text="selectedIds.size + ' selected'"></span>

  <div class="flex items-center gap-2 ml-auto">
    <form hx-post="/requisitions2/bulk/archive"
          hx-target="#rq2-table"
          hx-target-error="#rq2-error"
          hx-include="#rq2-filters"
          hx-confirm="Archive selected requisitions?"
          class="inline">
      <input type="hidden" name="ids" x-bind:value="getSelectedIdsString()">
      <button type="submit"
              class="inline-flex items-center gap-1.5 rounded-lg border border-gray-200 bg-white px-3 py-1.5 text-xs font-medium text-gray-700 hover:bg-gray-50 transition-colors"
              data-loading-aria-busy>
        Archive Selected
      </button>
    </form>

    <form hx-post="/requisitions2/bulk/activate"
          hx-target="#rq2-table"
          hx-target-error="#rq2-error"
          hx-include="#rq2-filters"
          class="inline">
      <input type="hidden" name="ids" x-bind:value="getSelectedIdsString()">
      <button type="submit"
              class="inline-flex items-center gap-1.5 rounded-lg border border-gray-200 bg-white px-3 py-1.5 text-xs font-medium text-gray-700 hover:bg-gray-50 transition-colors"
              data-loading-aria-busy>
        Activate Selected
      </button>
    </form>

    {% if user.role != 'sales' %}
    <div x-data="{ showAssign: false }" class="relative">
      <button x-on:click="showAssign = !showAssign"
              class="inline-flex items-center gap-1.5 rounded-lg border border-gray-200 bg-white px-3 py-1.5 text-xs font-medium text-gray-700 hover:bg-gray-50 transition-colors"
              type="button">
        Assign...
        <svg class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>
      <div x-show="showAssign" x-on:click.outside="showAssign = false" x-cloak
           x-transition
           class="absolute right-0 top-full mt-1 w-48 rounded-lg border border-gray-200 bg-white py-1 shadow-lg z-10">
        {% for u in users %}
        <form hx-post="/requisitions2/bulk/assign"
              hx-target="#rq2-table"
              hx-target-error="#rq2-error"
              hx-include="#rq2-filters"
              class="inline">
          <input type="hidden" name="ids" x-bind:value="getSelectedIdsString()">
          <input type="hidden" name="owner_id" value="{{ u.id }}">
          <button type="submit" class="flex w-full px-3 py-2 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
            {{ u.display_name }}
          </button>
        </form>
        {% endfor %}
      </div>
    </div>
    {% endif %}
  </div>
</div>
