{#
  topbar.html — Top bar with logo, global search, and breadcrumb.
  Called by: app/templates/base.html (via {% include %})
  Depends on: Alpine.js, HTMX, /v2/partials/search/global endpoint
  Context vars: user_name (str)
#}
<header class="sticky top-0 z-20 flex h-14 items-center justify-between gap-4 border-b border-brand-200 bg-white px-4 sm:px-6">

  {# Left: Logo #}
  <a href="/v2" hx-get="/v2/partials/dashboard" hx-target="#main-content" hx-push-url="/v2"
     class="flex-shrink-0">
    <img src="/static/avail_logo.png" alt="AVAIL" class="h-7">
  </a>

  {# Center: Global search #}
  <div class="relative mx-auto w-full max-w-lg" x-data="{ searchOpen: false }">
    <div class="relative">
      <svg xmlns="http://www.w3.org/2000/svg" class="pointer-events-none absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-gray-400"
           fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <path d="M21 21l-4.35-4.35"/>
      </svg>
      <input type="search"
             name="q"
             placeholder="Search requisitions, companies, vendors..."
             autocomplete="off"
             class="w-full rounded-lg border border-brand-200 bg-gray-50 py-2 pl-10 pr-4 text-sm text-gray-900 placeholder-gray-400 outline-none transition-colors focus:border-brand-400 focus:bg-white focus:ring-1 focus:ring-brand-400"
             hx-get="/v2/partials/search/global"
             hx-trigger="keyup changed delay:300ms"
             hx-target="#global-search-results"
             @focus="searchOpen = true"
             @blur="setTimeout(() => searchOpen = false, 200)"
             @keydown.escape="$el.blur(); searchOpen = false">
    </div>
    <div id="global-search-results"
         x-show="searchOpen" x-cloak
         x-transition:enter="transition ease-out duration-100"
         x-transition:enter-start="opacity-0 -translate-y-1"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-75"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 -translate-y-1"
         class="absolute left-0 right-0 top-full mt-1 max-h-80 overflow-y-auto rounded-lg border border-brand-200 bg-white shadow-lg">
    </div>
  </div>

  {# Right: Breadcrumb #}
  <div id="breadcrumb" class="hidden sm:flex flex-shrink-0 items-center text-sm text-gray-600">
    <span class="font-medium text-gray-900">Dashboard</span>
  </div>
</header>
