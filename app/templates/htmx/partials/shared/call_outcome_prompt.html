{# call_outcome_prompt.html — Non-blocking post-call outcome chip picker.
   Shown after a successful phone outreach log. Bound to $store.callOutcome.
   Called by: app/templates/htmx/base.html (global shell include).
   Depends on: Alpine.js store 'callOutcome' set in htmx_app.js.
#}
<div x-data
     x-show="$store.callOutcome.show"
     x-cloak
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0 translate-y-2"
     x-transition:enter-end="opacity-100 translate-y-0"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100 translate-y-0"
     x-transition:leave-end="opacity-0 translate-y-2"
     class="fixed bottom-20 left-1/2 -translate-x-1/2 z-50 w-full max-w-sm"
     role="dialog"
     aria-live="polite"
     aria-label="Call outcome">
  <div class="mx-4 bg-white rounded-xl shadow-float border border-zinc-200 p-4">
    <p class="text-sm font-medium text-zinc-800 mb-3"
       x-text="'How did the call with ' + ($store.callOutcome.contactName || 'the contact') + ' go?'"></p>
    <div class="grid grid-cols-2 gap-2 mb-3">
      <template x-for="chip in $store.callOutcome.chips" :key="chip.value">
        <button type="button"
                class="px-3 py-2 rounded-lg border text-xs font-medium transition-colors focus:outline-none focus:ring-2 focus:ring-brand-400 border-zinc-200 text-zinc-700 bg-white hover:bg-zinc-50"
                :aria-label="chip.label"
                @click="$store.callOutcome.submit(chip.value)">
          <span x-text="chip.label"></span>
        </button>
      </template>
    </div>
    <div class="flex gap-2 items-center">
      <input type="text"
             x-model="$store.callOutcome.note"
             maxlength="500"
             placeholder="Optional note…"
             class="flex-1 text-xs border border-zinc-200 rounded-lg px-2 py-1.5 focus:outline-none focus:ring-1 focus:ring-brand-400"
             @keydown.enter.prevent
             aria-label="Optional call note">
      <button type="button"
              class="text-xs text-zinc-400 hover:text-zinc-600 px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-brand-400 rounded"
              @click="$store.callOutcome.dismiss()"
              aria-label="Skip">
        Skip
      </button>
    </div>
  </div>
</div>
