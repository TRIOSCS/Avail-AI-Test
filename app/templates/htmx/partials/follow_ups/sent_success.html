{#
  follow_ups/sent_success.html — Replaces a follow-up card after sending.
  Receives: contact_id (int), vendor_name (str).
  Called by: htmx_views.py send_follow_up_htmx endpoint.
  Depends on: Tailwind CSS with brand palette.
#}
<div id="follow-up-{{ contact_id }}" class="bg-emerald-50 rounded-lg border border-emerald-200 p-4">
  <div class="flex items-center gap-2">
    <div class="flex items-center justify-center w-6 h-6 rounded-full bg-emerald-100">
      <svg class="h-4 w-4 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
      </svg>
    </div>
    <p class="text-sm font-medium text-emerald-700">Follow-up sent to <span class="font-semibold">{{ vendor_name }}</span></p>
  </div>
</div>
