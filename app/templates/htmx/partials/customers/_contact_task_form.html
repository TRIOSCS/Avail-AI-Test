{# _contact_task_form.html — Inline add-task form for a contact.
   Receives: company_id, contact_id
   Called by: GET /v2/partials/customers/{company_id}/contacts/{contact_id}/tasks/add-form
#}
<form hx-post="/v2/partials/customers/{{ company_id }}/contacts/{{ contact_id }}/tasks"
      hx-target="#contact-tasks-{{ contact_id }}"
      hx-swap="outerHTML"
      class="mt-1 space-y-2">
  <input type="text" name="title" placeholder="Task title" required
         class="w-full px-2 py-1 text-xs border border-gray-300 rounded input-focus"
         aria-label="Task title">
  <input type="date" name="due_at"
         class="px-2 py-1 text-xs border border-gray-300 rounded input-focus"
         aria-label="Due date">
  <div class="flex gap-2">
    <button type="submit"
            class="btn-primary btn-sm">Save</button>
    <button type="button"
            onclick="document.getElementById('contact-task-form-{{ contact_id }}').innerHTML = ''"
            class="btn-secondary btn-sm">Cancel</button>
  </div>
</form>
