{# _task_edit_form.html — Inline edit form for an existing CRM task.
   Receives: task (RequisitionTask), company_id (int, if account-scoped), contact (SiteContact, if contact-scoped)
   Called by: GET /v2/partials/tasks/{task_id}/edit-form
   Depends on: POST /v2/partials/tasks/{task_id}/edit
#}
<form hx-post="/v2/partials/tasks/{{ task.id }}/edit"
      hx-target="#{% if task.company_id %}account-tasks-{{ task.company_id }}{% else %}contact-tasks-{{ task.site_contact_id }}{% endif %}"
      hx-swap="outerHTML"
      class="mt-2 space-y-2">
  <input type="text" name="title" value="{{ task.title }}" required
         placeholder="Task title"
         class="w-full px-2 py-1 text-xs border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-brand-500"
         aria-label="Task title">
  <input type="date" name="due_at"
         value="{{ task.due_at.strftime('%Y-%m-%d') if task.due_at else '' }}"
         class="px-2 py-1 text-xs border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-brand-500"
         aria-label="Due date">
  <div id="task-edit-error-{{ task.id }}"></div>
  <div class="flex gap-2">
    <button type="submit"
            class="btn btn-primary btn-sm">Save</button>
    <button type="button"
            hx-get="/v2/partials/{% if task.company_id %}customers/{{ task.company_id }}/tasks{% else %}customers/{{ company_id }}/contacts/{{ task.site_contact_id }}/tasks{% endif %}"
            hx-target="#{% if task.company_id %}account-tasks-{{ task.company_id }}{% else %}contact-tasks-{{ task.site_contact_id }}{% endif %}"
            hx-swap="outerHTML"
            class="btn btn-secondary btn-sm">Cancel</button>
  </div>
</form>
