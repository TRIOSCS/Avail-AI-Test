{# _account_task_form.html — Inline add-task form for an account.
   Receives: company_id
   Called by: GET /v2/partials/customers/{company_id}/tasks/add-form
#}
<form hx-post="/v2/partials/customers/{{ company_id }}/tasks"
      hx-target="#account-tasks-{{ company_id }}"
      hx-swap="outerHTML"
      class="mt-2 space-y-2">
  <input type="text" name="title" placeholder="Task title" required
         class="w-full px-2 py-1 text-xs border border-gray-300 rounded input-focus"
         aria-label="Task title">
  <input type="date" name="due_at"
         class="px-2 py-1 text-xs border border-gray-300 rounded input-focus"
         aria-label="Due date">
  <div class="flex gap-2">
    <select name="priority" aria-label="Priority"
            class="px-2 py-1 text-xs border border-gray-300 rounded input-focus">
      <option value="2" selected>Medium</option>
      <option value="1">Low</option>
      <option value="3">High</option>
    </select>
    <select name="assigned_to_id" aria-label="Assignee"
            class="flex-1 px-2 py-1 text-xs border border-gray-300 rounded input-focus">
      {% for u in users %}
      <option value="{{ u.id }}"{{ ' selected' if u.id == current_user_id else '' }}>{{ u.name or u.email }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="flex gap-2">
    <button type="submit"
            class="btn-primary btn-sm">Save</button>
    <button type="button"
            onclick="document.getElementById('account-task-form-{{ company_id }}').innerHTML = ''"
            class="btn-secondary btn-sm">Cancel</button>
  </div>
</form>
