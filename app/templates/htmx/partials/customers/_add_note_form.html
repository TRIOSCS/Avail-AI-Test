{# _add_note_form.html — Add-note form on the account Activity tab.
   Receives: company_id (int)
   Called by: GET /v2/partials/customers/{company_id}/activity/add-note-form
   Depends on: POST /v2/partials/customers/{company_id}/activity/add-note
#}
<div class="bg-white rounded-lg border border-gray-200 p-4 mt-3" id="add-note-form-{{ company_id }}">
  <h3 class="h3 mb-2">Add note</h3>
  <form hx-post="/v2/partials/customers/{{ company_id }}/activity/add-note"
        hx-target="#activity-tab-{{ company_id }}"
        hx-swap="outerHTML"
        class="space-y-2">
    <textarea name="notes" rows="3" required
              placeholder="Write a note…"
              class="w-full px-3 py-2 text-sm border border-gray-300 rounded input-focus"
              aria-label="Note text"></textarea>
    <div class="flex gap-2">
      <button type="submit"
              class="btn btn-primary btn-sm">Save note</button>
    </div>
  </form>
</div>
