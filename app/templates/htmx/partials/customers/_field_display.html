{# Inline-editable field display span (WS1).
   Clicking switches to _field_edit.html via HTMX outerHTML swap.
   Empty value shows a dashed "Add <label>" placeholder.

   Receives: obj (Company|SiteContact ORM object), field (str), entity ('company'|'contact'),
             meta {label, kind, choices?}, edit_url (str).
   Called by: company/contact detail templates + field GET/POST/display endpoints (htmx_views.py).
#}
{% set _val = obj | attr(field) %}
<span id='field-{{ entity }}-{{ obj.id }}-{{ field }}'
      hx-get='{{ edit_url }}'
      hx-target='this'
      hx-swap='outerHTML'
      class='cursor-pointer hover:bg-brand-50 rounded px-1 -mx-1 transition-colors'
      title='Click to edit {{ meta.label }}'>
  {% if _val %}
    <span class='text-sm text-gray-900'>{{ _val }}</span>
  {% else %}
    <span class='inline-flex items-center gap-1 px-2 py-0.5 text-xs font-medium rounded border border-dashed border-gray-300 text-gray-400 hover:border-brand-300 hover:text-brand-500 transition-colors'>
      + Add {{ meta.label }}
    </span>
  {% endif %}
</span>
