{# _form_fields.html — Shared field macros for the company create/edit forms.
   Extracted from create_form.html and edit_form.html to remove copy-paste of the
   account-owner <select>.

   Call convention: the macro body's first line carries no leading indentation, so
   the call site supplies the opening indent, e.g. `      {{ owner_select(users) }}`.
   Called by: customers/create_form.html, customers/edit_form.html.
   Depends on: Tailwind CSS with brand palette.
#}

{# Account-owner picker. The edit form passes with_selection=True so each option
   carries the ` selected`-or-empty conditional (matching its original markup,
   which always emitted the trailing space even with no owner). The create form
   leaves with_selection=False, omitting the attribute entirely. #}
{%- macro owner_select(users, selected_id=none, with_selection=False) -%}
<div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Account Owner</label>
        <select name="owner_id"
                class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:ring-brand-500 focus:border-brand-500">
          <option value="">— None —</option>
          {% for u in users %}
          <option value="{{ u.id }}"{% if with_selection %} {{ 'selected' if selected_id == u.id else '' }}{% endif %}>{{ u.name }} ({{ u.role }})</option>
          {% endfor %}
        </select>
      </div>
{%- endmacro -%}
