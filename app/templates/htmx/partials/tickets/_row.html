<div hx-get="/v2/partials/trouble-tickets/{{ t.id }}"
     hx-target="#main-content"
     hx-push-url="/v2/trouble-tickets/{{ t.id }}"
     class="flex items-center gap-4 px-4 py-3 bg-white border border-gray-100 rounded-lg mb-1 cursor-pointer hover:bg-gray-50 transition-colors">
  <span class="text-xs font-mono text-gray-400 w-16 shrink-0">{{ t.ticket_number }}</span>
  <span class="text-sm text-gray-700 flex-1 truncate">{{ t.ai_summary or t.title }}</span>
  <span class="text-xs px-2 py-0.5 rounded-full shrink-0
    {% if t.status == 'submitted' %}bg-yellow-100 text-yellow-700
    {% elif t.status == 'in_progress' %}bg-blue-100 text-blue-700
    {% elif t.status == 'resolved' %}bg-green-100 text-green-700
    {% elif t.status == 'wont_fix' %}bg-gray-100 text-gray-500
    {% else %}bg-gray-100 text-gray-500{% endif %}">{{ t.status|replace('_', ' ')|title }}</span>
  <span class="text-xs text-gray-400 w-24 shrink-0 text-right">{{ t.created_at|fmtdate }}</span>
</div>
