{# _vendor_task_form.html — Inline add-task form for a vendor card.
   Receives: vendor_id
   Called by: GET /v2/partials/vendors/{vendor_id}/tasks/add-form
#}
<form hx-post="/v2/partials/vendors/{{ vendor_id }}/tasks"
      hx-target="#vendor-tasks-{{ vendor_id }}"
      hx-swap="outerHTML"
      class="mt-2 space-y-2">
  <input type="text" name="title" placeholder="Task title" required
         class="w-full px-2 py-1 text-xs border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-brand-500"
         aria-label="Task title">
  <input type="date" name="due_at"
         class="px-2 py-1 text-xs border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-brand-500"
         aria-label="Due date">
  <div class="flex gap-2">
    <button type="submit"
            class="btn btn-sm">Save</button>
    <button type="button"
            hx-get="/v2/partials/vendors/{{ vendor_id }}/tasks"
            hx-target="#vendor-tasks-{{ vendor_id }}"
            hx-swap="outerHTML"
            class="btn btn-sm btn-secondary">Cancel</button>
  </div>
</form>
