{# create_form.html — Create new vendor form.
   Receives: (no template vars required).
   Called by: htmx_views.py vendor_create_form route.
   Depends on: HTMX, Tailwind CSS with brand palette.
#}
<div class="max-w-2xl mx-auto">
  <div class="bg-white rounded-lg shadow-card border border-gray-200 p-6">
    <div class="flex items-center justify-between mb-4">
      <h2 class="h2">Add Vendor</h2>
      <button hx-get="/v2/partials/vendors"
              hx-target="#main-content"
              class="text-sm text-gray-500 hover:text-gray-700">Cancel</button>
    </div>

    <form hx-post="/v2/partials/vendors/create"
          hx-target="#main-content"
          data-loading-disable
          class="space-y-4">

      {# Vendor name with inline duplicate check #}
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Vendor Name *</label>
        <input type="text" name="display_name" required
               hx-get="/api/vendors/check-duplicate"
               hx-trigger="keyup changed delay:500ms"
               hx-target="#dup-warning"
               hx-include="[name=display_name]"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500"
               placeholder="e.g. Arrow Electronics">
        <div id="dup-warning" class="mt-1 text-xs text-amber-600"></div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Website</label>
          <input type="url" name="website"
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500"
                 placeholder="https://example.com">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Industry</label>
          <input type="text" name="industry"
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500"
                 placeholder="e.g. Electronic Components">
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Emails (comma-separated)</label>
          <input type="text" name="emails"
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500"
                 placeholder="sales@vendor.com, info@vendor.com">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Phones (comma-separated)</label>
          <input type="text" name="phones"
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500"
                 placeholder="+1-555-0100">
        </div>
      </div>

      <fieldset class="border border-gray-200 rounded-lg p-4 space-y-3">
        <legend class="text-xs font-semibold text-gray-600 uppercase tracking-wide px-1">Location</legend>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">City</label>
            <input type="text" name="hq_city"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500"
                   placeholder="e.g. Chicago">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Country</label>
            <input type="text" name="hq_country"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500"
                   placeholder="e.g. US">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Employee Size</label>
          <select name="employee_size"
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
            <option value="">— Select —</option>
            <option value="1-10">1–10</option>
            <option value="11-50">11–50</option>
            <option value="51-200">51–200</option>
            <option value="201-500">201–500</option>
            <option value="501-1000">501–1,000</option>
            <option value="1001-5000">1,001–5,000</option>
            <option value="5001+">5,001+</option>
          </select>
        </div>
      </fieldset>

      <div class="flex gap-3">
        <button type="submit"
                class="btn-primary btn-md">
          Add Vendor
        </button>
        <button type="button"
                hx-get="/v2/partials/vendors"
                hx-target="#main-content"
                class="btn-secondary btn-md">
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>
