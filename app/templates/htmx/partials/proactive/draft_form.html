{#
  draft_form.html — AI-drafted proactive offer email compose form.
  Receives: match (ProactiveMatch), draft_subject (str), draft_body (str).
  Called by: htmx_views.py proactive_draft route.
  Depends on: HTMX, Tailwind CSS with brand palette.
#}
<div class="space-y-3">
  <div class="flex items-center gap-2 mb-2">
    <svg class="h-4 w-4 text-brand-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
    </svg>
    <h4 class="text-sm font-semibold text-gray-900">AI-Drafted Offer</h4>
    <span class="text-xs text-gray-400 font-mono">{{ match.mpn }}</span>
  </div>
  <form hx-post="/v2/partials/proactive/{{ match.id }}/send"
        hx-target="closest div"
        hx-swap="outerHTML"
        class="space-y-3">
    <div>
      <label class="block text-xs font-medium text-gray-500 mb-1">Subject</label>
      <input type="text" name="subject" value="{{ draft_subject }}"
             class="w-full px-3 py-2 text-sm border border-brand-200 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
    </div>
    <div>
      <label class="block text-xs font-medium text-gray-500 mb-1">Email Body</label>
      <textarea name="body" rows="6"
                class="w-full px-3 py-2 text-sm border border-brand-200 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500">{{ draft_body }}</textarea>
    </div>
    <div class="flex gap-2">
      <button type="submit"
              class="inline-flex items-center gap-1.5 px-4 py-2 text-sm font-medium text-white bg-brand-500 rounded-lg hover:bg-brand-600 transition-colors">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
        </svg>
        Send
      </button>
      <button type="button" hx-get="/v2/partials/proactive" hx-target="#main-content"
              class="px-4 py-2 text-sm font-medium text-gray-600 bg-white border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors">
        Cancel
      </button>
    </div>
  </form>
</div>
