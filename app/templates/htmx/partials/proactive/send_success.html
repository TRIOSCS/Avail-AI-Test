{#
  send_success.html — Proactive offer sent confirmation.
  Receives: match (ProactiveMatch).
  Called by: htmx_views.py proactive_send route.
  Depends on: Tailwind CSS with brand palette.
#}
<div class="bg-emerald-50 border border-emerald-200 rounded-lg p-4">
  <div class="flex items-center gap-2">
    <svg class="h-5 w-5 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
    </svg>
    <span class="text-sm font-medium text-emerald-700">Proactive offer sent for <span class="font-mono">{{ match.mpn }}</span></span>
  </div>
  <p class="mt-1 ml-7 text-xs text-emerald-600">The match has been moved to the Sent tab.</p>
</div>
