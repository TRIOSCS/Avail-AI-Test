{# Add line item modal form for excess list.
   Receives: list_id.
   Called by: excess router add-line-item-form endpoint.
#}
<div class="p-4">
  <h3 class="text-lg font-semibold text-gray-900 mb-4">Add Line Item</h3>
  <form hx-post="/api/excess-lists/{{ list_id }}/line-items"
        hx-target="#main-content"
        hx-ext="json-enc"
        data-loading-disable
        @htmx:after-request.camel="if(event.detail.successful) { $dispatch('close-modal'); $dispatch('show-toast', {message: 'Line item added', type: 'success'}) }"
        hx-get="/v2/partials/excess/{{ list_id }}"
        hx-swap="innerHTML"
        class="space-y-4">
    <div>
      <label class="form-label">Part Number *</label>
      <input type="text" name="part_number" required
             class="input"
             placeholder="e.g. LM358N">
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="form-label">Manufacturer</label>
        <input type="text" name="manufacturer"
               class="input"
               placeholder="e.g. Texas Instruments">
      </div>
      <div>
        <label class="form-label">Quantity *</label>
        <input type="number" name="quantity" required min="1" value="1"
               class="input">
      </div>
    </div>
    <div class="grid grid-cols-3 gap-4">
      <div>
        <label class="form-label">Condition</label>
        <select name="condition"
                class="input">
          <option value="New" selected>New</option>
          <option value="Used">Used</option>
          <option value="Refurbished">Refurbished</option>
        </select>
      </div>
      <div>
        <label class="form-label">Date Code</label>
        <input type="text" name="date_code"
               class="input"
               placeholder="e.g. 2024+">
      </div>
      <div>
        <label class="form-label">Asking Price</label>
        <input type="number" name="asking_price" step="0.01" min="0"
               class="input"
               placeholder="0.00">
      </div>
    </div>
    <div>
      <label class="form-label">Notes</label>
      <textarea name="notes" rows="2"
                class="input"
                placeholder="Optional notes..."></textarea>
    </div>
    <div class="flex justify-end gap-3 pt-2">
      <button type="button" @click="$dispatch('close-modal')"
              class="btn btn-md btn-secondary">
        Cancel
      </button>
      <button type="submit"
              class="px-4 py-2 text-sm font-medium text-white bg-brand-600 rounded-lg hover:bg-brand-700">
        Add Line Item
      </button>
    </div>
  </form>
</div>
