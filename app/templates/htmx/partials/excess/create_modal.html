{# create_modal.html — Excess list creation form loaded into #modal-content.
   Receives: companies (list of Company objects).
   Called by: "New List" button dispatching open-modal + hx-get.
   Depends on: modal.html shell, brand palette, Alpine.js.
#}
<div class="p-6">
  <div class="flex items-center justify-between mb-6">
    <h2 class="text-lg font-semibold text-gray-900">New Excess List</h2>
    <button type="button" @click="$dispatch('close-modal')" class="text-gray-400 hover:text-gray-600 transition-colors">
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <form hx-post="/api/excess-lists"
        hx-target="#excess-table-body"
        hx-swap="afterbegin"
        hx-ext="json-enc"
        data-loading-disable
        @htmx:after-request.camel="if(event.detail.successful) { $dispatch('close-modal'); Alpine.store('toast').message='Excess list created'; Alpine.store('toast').type='success'; Alpine.store('toast').show=true; }">
    <div class="grid grid-cols-1 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-900 mb-1">Title <span class="text-rose-500">*</span></label>
        <input type="text" name="title" required placeholder="e.g. Q1 2026 Surplus — Acme Corp"
               class="w-full px-3 py-2 border border-brand-200 rounded-lg text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-900 mb-1">Company <span class="text-rose-500">*</span></label>
        <select name="company_id" required
                class="w-full px-3 py-2 border border-brand-200 rounded-lg text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
          <option value="">Select company...</option>
          {% for c in companies %}
          <option value="{{ c.id }}">{{ c.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-900 mb-1">Notes</label>
        <textarea name="notes" rows="3" placeholder="Optional notes about this excess list..."
                  class="w-full px-3 py-2 border border-brand-200 rounded-lg text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500"></textarea>
      </div>
    </div>
    <div class="mt-6 flex justify-end gap-3 pt-4 border-t border-gray-100">
      <button type="button" @click="$dispatch('close-modal')"
              class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors">Cancel</button>
      <button type="submit"
              class="px-4 py-2 text-sm font-medium text-white bg-brand-500 rounded-lg hover:bg-brand-600 shadow-sm transition-colors">Create List</button>
    </div>
  </form>
</div>
