<!DOCTYPE html>
<html lang="en" class="h-full bg-brand-800">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AvailAI - Sign In</title>
  {% for css_file in vite_css|default([]) %}
  <link rel="stylesheet" href="/static/dist/{{ css_file }}">
  {% endfor %}
</head>
<body class="h-full flex items-center justify-center">
  <div class="max-w-sm w-full mx-4">
    <div class="text-center mb-8">
      <img src="/static/public/avail_logo.png" alt="AVAIL Opportunity Management" class="h-16 w-auto mx-auto">
      <p class="mt-3 text-brand-300">Electronic Component Sourcing Platform</p>
    </div>

    <div class="bg-brand-700 rounded-xl shadow-2xl p-8 border border-brand-600">
      <h2 class="text-lg font-semibold text-white text-center mb-6">Sign in to continue</h2>
      <a href="/auth/login"
         class="w-full flex items-center justify-center gap-3 px-4 py-3 bg-white text-gray-900 rounded-lg font-medium hover:bg-gray-100 transition-colors">
        <svg class="h-5 w-5" viewBox="0 0 21 21"><path fill="#f25022" d="M0 0h10v10H0z"/><path fill="#00a4ef" d="M0 11h10v10H0z"/><path fill="#7fba00" d="M11 0h10v10H11z"/><path fill="#ffb900" d="M11 11h10v10H11z"/></svg>
        Sign in with Microsoft
      </a>
      <p class="mt-4 text-xs text-brand-400 text-center">Trio Supply Chain Solutions</p>
    </div>
  </div>
</body>
</html>
