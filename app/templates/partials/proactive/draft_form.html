{# draft_form.html — AI-drafted proactive offer email compose form.
   Receives: match (ProactiveMatch), draft_subject (str), draft_body (str).
   Called by: htmx_views.py proactive_draft route.
   Depends on: HTMX, Tailwind CSS.
#}
<div class="bg-white rounded-lg border border-gray-200 p-4">
  <h4 class="text-sm font-semibold text-gray-900 mb-3">Draft Proactive Offer</h4>
  <form hx-post="/v2/partials/proactive/{{ match.id }}/send"
        hx-target="closest div"
        hx-swap="outerHTML"
        class="space-y-3">
    <div>
      <label class="block text-xs text-gray-500 mb-1">Subject</label>
      <input type="text" name="subject" value="{{ draft_subject }}"
             class="w-full px-2 py-1.5 text-sm border border-gray-300 rounded focus:ring-brand-500 focus:border-brand-500">
    </div>
    <div>
      <label class="block text-xs text-gray-500 mb-1">Email Body</label>
      <textarea name="body" rows="6"
                class="w-full px-2 py-1.5 text-sm border border-gray-300 rounded focus:ring-brand-500 focus:border-brand-500">{{ draft_body }}</textarea>
    </div>
    <div class="flex gap-2">
      <button type="submit" class="px-3 py-1.5 text-xs font-medium text-white bg-brand-500 rounded hover:bg-brand-600">Send</button>
      <button type="button" hx-get="/v2/partials/proactive" hx-target="#main-content"
              class="px-3 py-1.5 text-xs text-gray-600 bg-gray-100 rounded hover:bg-gray-200">Cancel</button>
    </div>
  </form>
</div>
