{#
  create_modal.html — Alpine-powered form for creating a new requisition.
  Loaded into #modal-content via HTMX when "New Requisition" is clicked.
  Called by: views.py requisitions_create_form endpoint.
  Depends on: Alpine.js (x-data, x-model), HTMX (hx-post for form submit).
#}
<form hx-post="/api/requisitions"
      hx-target="#req-table-body"
      hx-swap="afterbegin"
      @htmx:after-request="if(event.detail.successful){ $dispatch('close-modal') }"
      x-data="{ name: '', customer: '' }">
    <h3>New Requisition</h3>

    <label for="req-name">Requisition Name</label>
    <input type="text" id="req-name" name="name" x-model="name"
           placeholder="Requisition name" required>

    <label for="req-customer">Customer</label>
    <input type="text" id="req-customer" name="customer_name" x-model="customer"
           placeholder="Customer name">

    <div class="modal-actions">
        <button type="submit" class="btn btn-primary" :disabled="!name.trim()">Create</button>
        <button type="button" class="btn btn-secondary" @click="$dispatch('close-modal')">Cancel</button>
    </div>
</form>
