{# Empty state placeholder — used when a list has no items. #}
<div class="flex flex-col items-center justify-center py-16 text-gray-400">
    <svg class="h-12 w-12 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
    </svg>
    <p class="text-lg">{{ message | default("No items found.") }}</p>
    {% if action_url %}
    <button hx-get="{{ action_url }}" hx-target="#main-content"
            class="mt-4 px-4 py-2 text-sm font-medium text-white bg-brand-500 rounded-lg hover:bg-brand-600">
      {{ action_label | default("Create one") }}
    </button>
    {% endif %}
</div>
