{#
  task_create_form.html — Inline form for creating a new task from the task manager.
  Receives: requisitions (list of Requisition objects), users (list of User objects).
  Called by: task_list.html (included inline).
  Depends on: Alpine.js for form state, fetch API for POST.
#}
<div class="card" style="padding:16px;border:1px solid #bfdbfe;background:#eff6ff;"
     x-data="{
         title: '',
         description: '',
         requisition_id: '',
         assigned_to_id: '',
         priority: '2',
         due_at: '',
         submitting: false,
         createTask() {
             if (!this.title.trim()) { alert('Title is required.'); return; }
             if (!this.requisition_id) { alert('Select a requisition.'); return; }
             if (!this.assigned_to_id) { alert('Select an assignee.'); return; }
             if (!this.due_at) { alert('Due date is required.'); return; }
             this.submitting = true;
             fetch(`/api/requisitions/${this.requisition_id}/tasks`, {
                 method: 'POST',
                 headers: {'Content-Type': 'application/json'},
                 body: JSON.stringify({
                     title: this.title.trim(),
                     description: this.description.trim() || null,
                     assigned_to_id: parseInt(this.assigned_to_id),
                     due_at: new Date(this.due_at).toISOString(),
                 })
             })
             .then(resp => {
                 if (!resp.ok) return resp.json().then(d => { throw new Error(d.detail || 'Create failed'); });
                 return resp.json();
             })
             .then(() => {
                 htmx.ajax('GET', window.location.href, '#main-content');
             })
             .catch(err => {
                 alert(err.message || 'Unable to create task.');
                 this.submitting = false;
             });
         }
     }">
    <div style="font-weight:600;margin-bottom:8px;">New Task</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <div>
            <label style="font-size:0.85em;color:#64748b;">Title *</label>
            <input type="text" x-model="title" placeholder="e.g. Follow up with Arrow"
                   style="width:100%;border:1px solid #e2e8f0;border-radius:4px;padding:6px;font-size:0.9em;">
        </div>
        <div>
            <label style="font-size:0.85em;color:#64748b;">Requisition *</label>
            <select x-model="requisition_id"
                    style="width:100%;border:1px solid #e2e8f0;border-radius:4px;padding:6px;font-size:0.9em;">
                <option value="">Select...</option>
                {% for req in requisitions %}
                <option value="{{ req.id }}">{{ req.name or ('Req #' ~ req.id) }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label style="font-size:0.85em;color:#64748b;">Assign To *</label>
            <select x-model="assigned_to_id"
                    style="width:100%;border:1px solid #e2e8f0;border-radius:4px;padding:6px;font-size:0.9em;">
                <option value="">Select...</option>
                {% for u in users %}
                <option value="{{ u.id }}">{{ u.name or u.email }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label style="font-size:0.85em;color:#64748b;">Priority</label>
            <select x-model="priority"
                    style="width:100%;border:1px solid #e2e8f0;border-radius:4px;padding:6px;font-size:0.9em;">
                <option value="1">Low</option>
                <option value="2" selected>Medium</option>
                <option value="3">High</option>
            </select>
        </div>
        <div>
            <label style="font-size:0.85em;color:#64748b;">Due Date *</label>
            <input type="date" x-model="due_at"
                   style="width:100%;border:1px solid #e2e8f0;border-radius:4px;padding:6px;font-size:0.9em;">
        </div>
        <div>
            <label style="font-size:0.85em;color:#64748b;">Description</label>
            <input type="text" x-model="description" placeholder="Optional details..."
                   style="width:100%;border:1px solid #e2e8f0;border-radius:4px;padding:6px;font-size:0.9em;">
        </div>
    </div>
    <div style="margin-top:8px;">
        <button class="btn btn-xs btn-primary" @click="createTask()" :disabled="submitting">
            <span x-text="submitting ? 'Creating...' : 'Create Task'"></span>
        </button>
    </div>
</div>
