{# thread_summary.html — AI-generated email thread summary.
   Receives: summary (str|None), error (str|None).
   Called by: htmx_views.py email_thread_summary route.
   Depends on: Tailwind CSS.
#}
{% if error %}
<div class="m-4 bg-amber-50 border border-amber-200 rounded p-3">
  <p class="text-sm text-amber-700">{{ error }}</p>
</div>
{% elif summary %}
<div class="m-4 bg-brand-50 border border-brand-200 rounded-lg p-3">
  <div class="flex items-center gap-2 mb-2">
    <svg class="h-4 w-4 text-brand-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
    </svg>
    <span class="text-xs font-semibold text-brand-700">AI Summary</span>
  </div>
  <p class="text-sm text-gray-700">{{ summary }}</p>
</div>
{% endif %}
