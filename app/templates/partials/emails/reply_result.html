{#
  reply_result.html — Email reply result confirmation.
  Receives: to (str), error (str|None), conversation_id (str).
  Called by: htmx_views.py send_email_reply route.
  Depends on: HTMX, Tailwind CSS with brand palette.
#}
{% if error %}
<div class="bg-rose-50 border border-rose-200 rounded-lg p-3">
  <div class="flex items-center gap-2">
    <svg class="h-4 w-4 text-rose-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
    </svg>
    <span class="text-sm text-rose-700">{{ error }}</span>
  </div>
</div>
{% else %}
<div class="bg-emerald-50 border border-emerald-200 rounded-lg p-3">
  <div class="flex items-center gap-2">
    <svg class="h-4 w-4 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
    </svg>
    <span class="text-sm text-emerald-700">Reply sent to {{ to }}.</span>
    <button hx-get="/v2/partials/emails/thread/{{ conversation_id }}"
            hx-target="#main-content"
            class="ml-2 text-xs font-medium text-brand-600 hover:text-brand-700 underline">Refresh thread</button>
  </div>
</div>
{% endif %}
