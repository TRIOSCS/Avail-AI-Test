[pytest]
asyncio_mode = auto
testpaths = tests
# E2E tests hit the live Docker app and use Playwright; run separately:
#   pytest tests/e2e/ --headed
# Coverage is optional for local runs; CI adds --cov via command line.
addopts = --ignore=tests/e2e --ignore=tests/test_browser_e2e.py --ignore=.claude --timeout=60 --timeout-method=thread
markers =
    e2e: E2E tests requiring live Docker app (run separately)
    slow: Tests that take >10s (run with -m "not slow" for quick runs)
