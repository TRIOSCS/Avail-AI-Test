[pytest]
asyncio_mode = auto
testpaths = tests
# E2E tests hit the live Docker app and use Playwright; they pollute the
# asyncio event loop for subsequent unit tests.  Run them separately via:
#   pytest tests/e2e/ --headed
addopts = --ignore=tests/e2e --ignore=tests/test_browser_e2e.py --ignore=.claude --cov=app --cov-report=term-missing --timeout=30 --timeout-method=thread
